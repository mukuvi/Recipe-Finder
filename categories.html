<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Finder | Meal Categories</title>
    <meta name="description" content="Browse recipe categories easily!" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm">
      <div
        class="container mx-auto px-4 py-4 flex justify-between items-center"
      >
        <a href="index.html" class="flex items-center space-x-2">
          <i class="fas fa-utensils text-2xl text-indigo-600"></i>
          <h1 class="text-2xl font-bold text-indigo-700">RecipeFinder</h1>
        </a>
        <nav class="hidden md:flex">
          <ul class="flex space-x-6">
            <li>
              <a
                href="index.html"
                class="text-gray-700 hover:text-indigo-600 transition"
                >Home</a
              >
            </li>
            <li>
              <a
                href="categories.html"
                class="text-gray-700 hover:text-indigo-600 transition"
                >Categories</a
              >
            </li>
            <li>
              <a
                href="about.html"
                class="text-gray-700 hover:text-indigo-600 transition"
                >About</a
              >
            </li>
          </ul>
        </nav>
        <!-- Hamburger -->
        <button id="menuToggle" class="md:hidden text-gray-700">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>

      <!-- Mobile Menu -->
      <div id="mobileMenu" class="md:hidden hidden px-4 pb-4">
        <ul class="flex flex-col space-y-2">
          <li>
            <a
              href="index.html"
              class="block text-gray-700 hover:text-indigo-600 transition"
              >Home</a
            >
          </li>
          <li>
            <a
              href="categories.html"
              class="block text-gray-700 hover:text-indigo-600 transition"
              >Categories</a
            >
          </li>
          <li>
            <a
              href="about.html"
              class="block text-gray-700 hover:text-indigo-600 transition"
              >About</a
            >
          </li>
        </ul>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
      <h2 class="text-3xl font-bold text-center mb-8">Meal Categories</h2>

      <div
        id="categories"
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"
      >
        <!-- Categories will load here -->
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
      <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <h3 class="text-xl font-bold mb-4">RecipeFinder</h3>
            <p class="text-gray-400">
              Discover and share delicious recipes from around the world.
            </p>
          </div>
          <div>
            <h4 class="text-lg font-semibold mb-4">Quick Links</h4>
            <ul class="space-y-2">
              <li>
                <a
                  href="index.html"
                  class="text-gray-400 hover:text-white transition"
                  >Home</a
                >
              </li>
              <li>
                <a
                  href="categories.html"
                  class="text-gray-400 hover:text-white transition"
                  >Categories</a
                >
              </li>
              <li>
                <a
                  href="about.html"
                  class="text-gray-400 hover:text-white transition"
                  >About Us</a
                >
              </li>
            </ul>
          </div>
          <div>
            <h4 class="text-lg font-semibold mb-4">Connect</h4>
            <div class="flex space-x-4">
              <a
                href="#"
                class="text-gray-400 hover:text-white transition text-xl"
                ><i class="fab fa-facebook"></i
              ></a>
              <a
                href="#"
                class="text-gray-400 hover:text-white transition text-xl"
                ><i class="fab fa-twitter"></i
              ></a>
              <a
                href="#"
                class="text-gray-400 hover:text-white transition text-xl"
                ><i class="fab fa-instagram"></i
              ></a>
            </div>
          </div>
        </div>
        <div
          class="border-t border-gray-700 mt-8 pt-6 text-center text-gray-400"
        >
          <p>&copy; 2025 RecipeFinder. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script>
      const menuToggle = document.getElementById("menuToggle");
      const mobileMenu = document.getElementById("mobileMenu");
      menuToggle?.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
      });

      // Load categories from API
      async function loadCategories() {
        try {
          const response = await fetch(
            "https://www.themealdb.com/api/json/v1/1/categories.php"
          );
          const data = await response.json();
          displayCategories(data.categories);
        } catch (error) {
          console.error("Error loading categories:", error);
        }
      }

      function displayCategories(categories) {
        const container = document.getElementById("categories");
        container.innerHTML = categories
          .map(
            (cat) => `
          <a href="#" onclick="showCategory('${cat.strCategory}')" 
             class="bg-white rounded-xl shadow-md p-4 text-center hover:shadow-lg transition transform hover:-translate-y-1 fade-in">
            <img src="${cat.strCategoryThumb}" alt="${cat.strCategory}" 
                 class="w-full h-24 object-contain mb-3">
            <h3 class="font-semibold">${cat.strCategory}</h3>
          </a>
        `
          )
          .join("");
      }

      function showCategory(category) {
        alert(`Showing meals for "${category}" - welcome to recipe finder.`);
      }

      loadCategories();
    </script>
  </body>
</html>
