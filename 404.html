<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 Not Found | RecipeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-gray-50 min-h-screen flex flex-col justify-center items-center px-4 text-center"
  >
    <div>
      <h1 class="text-9xl font-extrabold text-indigo-600 mb-6">404</h1>
      <p class="text-2xl font-semibold text-gray-800 mb-4">
        Oops! Page not found.
      </p>
      <p class="text-gray-600 mb-8 max-w-md mx-auto">
        Sorry, the page you're looking for doesn't exist or has been moved.
      </p>
      <a
        href="index.html"
        class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg shadow hover:bg-indigo-700 transition"
      >
        <i class="fas fa-home mr-2"></i> Go back to Home
      </a>
    </div>
  </body>
</html>
